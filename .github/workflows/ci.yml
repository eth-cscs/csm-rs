name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (build, clippy, test, doc, audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Build
        run: cargo build --all-targets

      - name: Build (all features)
        run: cargo build --all-targets --all-features

      - name: Clippy
        run: cargo clippy --all-targets --no-deps

      - name: Test
        run: cargo test

      - name: Test (all features)
        run: cargo test --all-features

      - name: Docs
        # Doc strictness comes from `#![deny(rustdoc::broken_intra_doc_links)]`
        # in `src/lib.rs`; this step just runs rustdoc to surface it.
        # `missing_docs` is set to `warn` at the crate root and intentionally
        # does not fail this step.
        run: cargo doc --no-deps

      - name: Docs (all features)
        run: cargo doc --no-deps --all-features

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --quiet || true

      - name: Security audit
        # `.cargo/audit.toml` allowlists known CVEs in the AWS SDK
        # transitive chain (rustls-webpki 0.101.7 via aws-smithy-http-client).
        # See `README.md` "Security advisories" for the rationale. New
        # advisories beyond the allowlist will fail this step.
        run: cargo audit

  msrv:
    name: MSRV (1.91.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.91.1
        # Pinned to the floor declared in `Cargo.toml::package::rust-version`.
        # AWS SDK 1.135 / aws-config 1.8 require 1.91.1; check that csm-rs
        # still compiles cleanly there.
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.1"

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      - name: Check (all features)
        run: cargo check --all-features
