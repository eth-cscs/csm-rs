name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (build, clippy, test, doc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Build
        run: cargo build --all-targets

      - name: Clippy
        run: cargo clippy --all-targets --no-deps

      - name: Test
        run: cargo test

      - name: Docs
        # Doc strictness comes from `#![deny(rustdoc::broken_intra_doc_links)]`
        # in `src/lib.rs`; this step just runs rustdoc to surface it.
        # `missing_docs` is set to `warn` at the crate root and intentionally
        # does not fail this step.
        run: cargo doc --no-deps
